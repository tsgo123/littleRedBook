spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver # 指定数据库驱动类
    # 数据库连接信息
    url: jdbc:mysql://localhost:3306/littleredbook?useUnicode=true&characterEncoding=utf-8&autoReconnect=true&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root # 数据库用户名
    password: S2MMuTjyrZAMknLuwitAzh+kDUrFj3sGmRf/cnEWg+5SaBwW9W5iVcmGDjYu/1OQhJanHPS0dltAma0z8tA8hw== # 数据库密码
    type: com.alibaba.druid.pool.DruidDataSource #指定使用 Druid 连接池
    druid: # Druid 连接池
      initial-size: 5 # 初始化连接池大小
      min-idle: 5 # 最小连接池数量
      max-active: 20 # 最大连接池数量
      max-wait: 60000 # 连接时最大等待时间（单位：毫秒）
      test-while-idle: true #连接空闲时是否执行检查
      time-between-eviction-runs-millis: 60000 # 配置多久进行一次检测，检测需要关闭的连接（单位：毫秒）
      min-evictable-idle-time-millis: 300000 # 配置一个连接在连接池中最小生存的时间（单位：毫秒）
      max-evictable-idle-time-millis: 900000 # 配置一个连接在连接池中最大生存的时间（单位：毫秒）
      validation-query: SELECT 1 FROM DUAL # 配置测试连接是否可用的查询 sql
      connection-properties: config.decrypt=true;config.decrypt.key=MFwwDQYJKoZIhvcNAQEBBQADSwAwSAJBAKqTBOR6izgg+zEU16naN0CGfGmNbVN8aEskoLy8xbSRLUdnHcdH7nIytN+TzSJy9GP4SRT1M9aJtwWILkjsc9sCAwEAAQ==
      test-on-borrow: false #连接从连接池获取时是否测试连接的可用性
      test-on-return: false #连接返回连接池时是否测试连接的可用性
      pool-prepared-statements: false #是否缓存 PreparedStatement，默认为 false
      web-stat-filter: #用于配置 Druid 的 Web 监控功能
        enabled: true #表示是否开启 Web 监控功能,如果设置为 true，就可以通过浏览器访问 Druid 的监控页面
      stat-view-servlet: #配置 Druid 的监控后台访问路径、登录用户名和密码
        enabled: true #表示是否开启监控后台功能
        url-pattern: /druid/* # 配置监控后台访问路径
        login-username: admin # 配置监控后台登录的用户名、密码
        login-password: admin
      filter: #于配置 Druid 的过滤器，包括统计过滤器和防火墙过滤器
        stat: #配置 Druid 的统计过滤器
          enabled: true #用于配置 Druid 的过滤器，包括统计过滤器和防火墙过滤器
          log-slow-sql: true # 开启慢 sql 记录
          slow-sql-millis: 2000 # 若执行耗时大于 2s，则视为慢 sql
          merge-sql: true #是否开启 SQL 合并功能
        wall: # 防火墙
          config: #配置了防火墙的规则
            multi-statement-allow: true #表示是否允许执行多条 SQL 语句
        config:
          enabled: true
  data:
    redis:
      database: 0 # Redis 数据库索引（默认为 0）
      host: 127.0.0.1 # Redis 服务器地址
      port: 6379 # Redis 服务器连接端口
      password: lyz005200 # Redis 服务器连接密码（默认为空）
      timeout: 5s # 读超时时间
      connect-timeout: 5s # 链接超时时间
      lettuce:
        pool:
          max-active: 200 # 连接池最大连接数
          max-wait: -1ms # 连接池最大阻塞等待时间（使用负值表示没有限制）
          min-idle: 0 # 连接池中的最小空闲连接
          max-idle: 10 # 连接池中的最大空闲连接

logging:
  level:
    com.quanxiaoha.xiaohashu.count.biz.domain.mapper: debug

rocketmq:
  name-server: 127.0.0.1:9876 # name server 地址
  producer:
    group: xiaohashu_group
    send-message-timeout: 3000 # 消息发送超时时间，默认 3s
    retry-times-when-send-failed: 3 # 同步发送消息失败后，重试的次数
    retry-times-when-send-async-failed: 3 # 异步发送消息失败后，重试的次数
    max-message-size: 4096 # 消息最大大小
  consumer:
    group: xiaohashu_group
    pull-batch-size: 5 # 每次拉取的最大消息数
